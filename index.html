<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mellstroy Kombat ($MELL)</title>
    <script src="https://unpkg.com"></script>
    <style>
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { background: #07090e; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 15px; user-select: none; overflow-x: hidden; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .logo-text { font-size: 20px; font-weight: 900; color: #ff007f; letter-spacing: 1px; text-shadow: 0 0 15px rgba(255,0,127,0.4); }
        .user-profile-header { display: flex; align-items: center; gap: 12px; background: rgba(20, 26, 36, 0.6); backdrop-filter: blur(10px); padding: 12px; border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 15px; text-align: left; }
        .user-avatar { width: 44px; height: 44px; background: linear-gradient(135deg, #ff007f, #7f00ff); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; box-shadow: 0 0 15px rgba(255,0,127,0.3); }
        .user-info-text { display: flex; flex-direction: column; }
        .user-name { font-weight: bold; font-size: 15px; color: #fff; }
        .user-id { font-size: 11px; color: #8892b0; margin-top: 1px; }
        .navbar-top { display: flex; justify-content: space-between; align-items: center; background: rgba(16, 21, 32, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; padding: 6px; margin-bottom: 20px; width: 100%; }
        .nav-item { background: none; border: none; color: #8892b0; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; font-size: 11px; font-weight: 700; width: 25%; text-transform: uppercase; letter-spacing: 0.5px; transition: color 0.2s, background 0.2s; padding: 8px 4px; border-radius: 10px; }
        .nav-item.active { color: #ff007f; background: rgba(255, 0, 127, 0.08); text-shadow: 0 0 10px rgba(255,0,127,0.2); }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .profile-section { background: rgba(20, 26, 36, 0.7); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.04); }
        .level-title { font-size: 15px; font-weight: 800; color: #ff007f; margin-bottom: 8px; text-align: left; text-transform: uppercase; letter-spacing: 0.5px; }
        .progress-container { background: #161f2c; border-radius: 10px; height: 8px; width: 100%; overflow: hidden; margin-bottom: 15px; }
        .progress-bar { background: linear-gradient(90deg, #ff007f, #7f00ff); height: 100%; width: 0%; transition: width 0.3s ease; }
        .balance-title { font-size: 12px; color: #8892b0; text-transform: uppercase; letter-spacing: 1px; }
        .balance { font-size: 44px; font-weight: 900; color: #00ffcc; text-shadow: 0 0 25px rgba(0,255,204,0.35); margin: 3px 0; font-variant-numeric: tabular-nums; }
        .income { font-size: 13px; color: #00ffcc; background: rgba(0,255,204,0.08); padding: 5px 14px; border-radius: 20px; display: inline-block; font-weight: 700; border: 1px solid rgba(0,255,204,0.15); }
        .click-container { position: relative; margin: 40px auto; width: 235px; height: 235px; }
        .click-btn { width: 100%; height: 100%; border-radius: 50%; border: 6px solid #141a24; background: radial-gradient(circle, #ff0055, #20003b) center/cover no-repeat; box-shadow: 0 0 50px rgba(255, 0, 85, 0.5); cursor: pointer; transition: transform 0.05s ease; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; color: #fff; text-shadow: 0 0 10px #fff; letter-spacing: 1px; padding: 15px; text-align: center; }
        .click-btn:active { transform: scale(0.93); }
        .energy-text { font-size: 18px; color: #ffcc00; font-weight: 800; margin-bottom: 20px; }
        .tap-particle { position: absolute; font-size: 26px; font-weight: 900; color: #00ffcc; text-shadow: 0 0 10px #00ffcc; pointer-events: none; animation: fadeUpAndOut 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards; z-index: 100; }
        @keyframes fadeUpAndOut { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-120px) scale(1.1); } }
        .shop, .earn-section { display: flex; flex-direction: column; gap: 12px; max-width: 500px; margin: 0 auto; }
        .card { background: rgba(20, 26, 36, 0.6); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .card:hover { background: rgba(28, 37, 51, 0.7); }
        .card-info { display: flex; flex-direction: column; text-align: left; }
        .card-name { font-weight: bold; font-size: 16px; margin-bottom: 4px; color: #fff; }
        .casino-box { background: linear-gradient(145deg, #18112c, #0d091a); border: 2px solid #7f00ff; box-shadow: 0 0 30px rgba(127,0,255,0.25); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 15px; }
        .slots-display { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .slot-reel { width: 70px; height: 70px; background: #06080d; border: 2px solid #374151; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; }
        .slot-reel.spinning { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translateY(-2px); } 50% { transform: translateY(2px); } 100% { transform: translateY(-2px); } }
        .claim-btn { background: #ff007f; border: none; color: white; padding: 14px; border-radius: 12px; margin-top: 10px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header-actions">
        <div class="logo-text">$MELL KOMBAT</div>
        <div id="ton-connect-btn"></div>
    </div>

    <div class="user-profile-header">
        <div class="user-avatar" id="userLetter">M</div>
        <div class="user-info-text">
            <span class="user-name" id="profileName">Mellstroyer</span>
            <span class="user-id" id="profileId">ID: 123456789</span>
        </div>
    </div>

    <div class="navbar-top">
        <button class="nav-item active" onclick="switchTab('exchange', this)">Биржа</button>
        <button class="nav-item" onclick="switchTab('mine', this)">Майнинг</button>
        <button class="nav-item" onclick="switchTab('earn', this)">Казино</button>
        <button class="nav-item" onclick="switchTab('friends', this)">Кенты</button>
    </div>

    <!-- ВКЛАДКА 1: БИРЖА -->
    <div id="page-exchange" class="page active">
        <div class="profile-section">
            <div class="level-title" id="lvlTitle">0 СЕЗОН: БЕЗЫМЯННЫЙ</div>
            <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
            <div class="balance-title">Баланс токенов $MELL</div>
            <div class="balance" id="balanceText">0</div>
            <div class="income" id="incomeText">+0 $MELL/сек</div>
        </div>
        <div class="click-container" id="clickArea">
            <div class="click-btn" id="clickBtn"></div>
        </div>
        <div class="energy-text" id="energyText">⚡ 1000 / 1000</div>
    </div>

    <!-- ВКЛАДКА 2: МАЙНИНГ -->
    <div id="page-mine" class="page">
        <h2 style="text-align: left; margin: 0 0 20px 5px; font-size: 22px; font-weight: 800;">Улучшить Контракты</h2>
        <div class="shop" id="shopContainer"></div>
    </div>

    <!-- ВКЛАДКА 3: КАЗИНО -->
    <div id="page-earn" class="page">
        <h2 style="text-align: left; margin: 0 0 20px 5px; font-size: 22px; font-weight: 800;">Задания и Награды</h2>
        <div class="earn-section">
            <div class="casino-box">
                <b style="color: #ff007f; font-size: 18px; text-transform: uppercase;">🎰 Казино Меллстроя</b>
                <p style="margin: 5px 0 15px 0; font-size: 13px; color: #8892b0;">Ставка: <span style="color:#ffcc00; font-weight:bold;">100,000 $MELL</span>. Крути барабаны!</p>
                <div class="slots-display">
                    <div class="slot-reel" id="reel1">🎲</div>
                    <div class="slot-reel" id="reel2">🎲</div>
                    <div class="slot-reel" id="reel3">🎲</div>
                </div>
                <button class="claim-btn" style="background: linear-gradient(90deg, #7f00ff, #ff007f);" onclick="spinSlots()">КРУТИТЬ БОЯРУ</button>
            </div>
        </div>
    </div>

    <!-- ВКЛАДКА 4: КЕНТЫ -->
    <div id="page-friends" class="page">
        <h2>Твои Кенты</h2>
        <div class="profile-section" style="text-align: center;">
            <div class="balance-title">Всего приглашено кентов</div>
            <div class="balance" id="refCountText" style="font-size: 64px; color: #ffcc00;">0</div>
        </div>
        <button class="claim-btn" style="background: linear-gradient(90deg, #ff007f, #7f00ff);" onclick="copyRefLink()">🔗 СКОПИРОВАТЬ РЕФ-ССЫЛКУ</button>
    </div>
    <script>
        let userId = "123456789"; let username = "Mellstroyer";
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp; tg.expand();
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                userId = tg.initDataUnsafe.user.id.toString();
                username = tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name;
            }
        }

        document.getElementById('profileName').innerText = username;
        document.getElementById('profileId').innerText = `ID: ${userId}`;
        document.getElementById('userLetter').innerText = username.charAt(0).toUpperCase();

        let state = JSON.parse(localStorage.getItem('mell_data_' + userId)) || {
            balance: 5000, total_earned: 5000, energy: 1000, income: 0, upgrades: {}, refs: 0
        };

        const seasonColors = [
            "radial-gradient(circle, #ff0055, #20003b)", "radial-gradient(circle, #ffcc00, #3a2500)", 
            "radial-gradient(circle, #00ffcc, #002b20)", "radial-gradient(circle, #007fff, #00153a)", 
            "radial-gradient(circle, #7f00ff, #1a003a)", "radial-gradient(circle, #333333, #0a0a0a)", 
            "radial-gradient(circle, #ff3300, #4a0a00)", "radial-gradient(circle, #ff00aa, #3a0025)", 
            "radial-gradient(circle, #00ff00, #0a3a00)", "radial-gradient(circle, #73c2fb, #0f3047)", 
            "radial-gradient(circle, #b8860b, #3a2a00)", "radial-gradient(circle, #ff00ff, #2a002a)", 
            "radial-gradient(circle, #8b0000, #2a0000)", "radial-gradient(circle, #ffffff, #2c3e50)"
        ];

        const seasonsConfig = [
            { lvl: 0, title: "0 Сезон: Безымянный", img: "level0.JPG", max: 25000 },
            { lvl: 1, title: "1 Сезон: Темки", img: "level1.JPG", max: 150000 },
            { lvl: 2, title: "2 Сезон: Общага", img: "level2.JPG", max: 1000000 },
            { lvl: 3, title: "3 Сезон: Армия", img: "level3.JPG", max: 5000000 },
            { lvl: 4, title: "4 Сезон: Поезд брата", img: "level4.JPG", max: 20000000 },
            { lvl: 5, title: "5 Сезон: Мурино", img: "level5.JPG", max: 100000000 },
            { lvl: 6, title: "6 Сезон: Банька", img: "level6.JPG", max: 500000000 },
            { lvl: 7, title: "7 Сезон: Молочное", img: "level7.JPG", max: 2000000000 },
            { lvl: 8, title: "8 Сезон: Село против Города", img: "level8.JPG", max: 10000000000 },
            { lvl: 9, title: "9 Сезон: Мытищи", img: "level9.JPG", max: 50000000000 },
            { lvl: 10, title: "10 Сезон: Перевороты", img: "level10.JPG", max: 200000000000 },
            { lvl: 11, title: "11 Сезон: Элджеевка", img: "level11.JPG", max: 1000000000000}
        ];

        const upgradesConfig = {
            "papich": { name: "🎬 Нарезки с Папичем", cost: 100, income: 2 },
            "zubarev": { name: "🥟 Стрим с Зубаревым", cost: 800, income: 15 },
            "kick": { name: "🎰 Контракт с KICK", cost: 5000, income: 110 },
            "richard": { name: "💎 Часы Richard Mille", cost: 30000, income: 750 },
            "jet": { name: "✈️ Личный Бизнес-Джет", cost: 250000, income: 4500 }
        };

        function save() { localStorage.setItem('mell_data_' + userId, JSON.stringify(state)); }

        function getCurrentSeason() {
            for (let s of seasonsConfig) { if (state.total_earned < s.max) return s; }
            return seasonsConfig[seasonsConfig.length - 1];
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById('page-' + tabId).classList.add('active');
            btn.classList.add('active');
        }

        function updateUI() {
            let currentSeason = getCurrentSeason();
            document.getElementById('balanceText').innerText = Math.floor(state.balance).toLocaleString();
            document.getElementById('energyText').innerText = `⚡ ${state.energy} / 1000`;
            document.getElementById('incomeText').innerText = `+${state.income} $MELL/сек`;
            document.getElementById('lvlTitle').innerText = currentSeason.title.toUpperCase();
            document.getElementById('refCountText').innerText = state.refs;
            
            let colorIndex = Math.min(currentSeason.lvl, seasonColors.length - 1);
            document.getElementById('clickBtn').style.background = seasonColors[colorIndex];
            document.getElementById('clickBtn').style.backgroundImage = `url('${currentSeason.img}')`;
            
            let progressPercent = Math.min(100, (state.total_earned / currentSeason.max) * 100);
            document.getElementById('progressBar').style.width = progressPercent + '%';
            renderShop();
        }

        document.getElementById('clickArea').addEventListener('click', (e) => {
            if (state.energy <= 0) return;
            const particle = document.createElement('div');
            particle.className = 'tap-particle'; particle.innerText = '+1';
            const rect = e.currentTarget.getBoundingClientRect();
            particle.style.left = (e.clientX - rect.left) + 'px';
            particle.style.top = (e.clientY - rect.top) + 'px';
            e.currentTarget.appendChild(particle);
            setTimeout(() => particle.remove(), 600);

            state.balance += 1; state.total_earned += 1; state.energy -= 1;
            updateUI(); save();
        });

        function renderShop() {
            const container = document.getElementById('shopContainer'); container.innerHTML = "";
            for (let id in upgradesConfig) {
                let card = upgradesConfig[id]; let currentLvl = state.upgrades[id] || 0;
                let currentCost = Math.floor(card.cost * Math.pow(1.5, currentLvl));
                container.innerHTML += `
                    <div class="card" onclick="buyUpgrade('${id}')">
                        <div class="card-info"><b>${card.name}</b><span style="font-size:12px;color:#8892b0;margin-top:2px;">Уровень ${currentLvl}</span><span style="color:#00ffcc;font-size:13px;margin-top:4px;">+${card.income} $MELL/с</span></div>
                        <b style="color:#ffcc00; font-size:16px;">${currentCost.toLocaleString()}</b>
                    </div>`;
            }
        }

        function buyUpgrade(id) {
            let card = upgradesConfig[id]; let currentLvl = state.upgrades[id] || 0;
            let currentCost = Math.floor(card.cost * Math.pow(1.5, currentLvl));
            if (state.balance >= currentCost) {
                state.balance -= currentCost;
                state.upgrades[id] = currentLvl + 1;
                state.income += card.income;
                updateUI(); save();
            } else { alert("Не хватает токенов!"); }
        }

        function spinSlots() {
            if (state.balance < 100000) { alert("Минимальная ставка — 100,000 $MELL!"); return; }
            state.balance -= 100000;
            const r1 = document.getElementById('reel1'); const r2 = document.getElementById('reel2'); const r3 = document.getElementById('reel3');
            r1.classList.add('spinning'); r2.classList.add('spinning'); r3.classList.add('spinning');
            
            let emojis = ["🎬", "🎰", "✈️", "🥟"];
            let res1 = emojis[Math.floor(Math.random()*4)];
            let res2 = emojis[Math.floor(Math.random()*4)];
            let res3 = emojis[Math.floor(Math.random()*4)];

            setTimeout(() => {
                r1.classList.remove('spinning'); r2.classList.remove('spinning'); r3.classList.remove('spinning');
                r1.innerText = res1; r2.innerText = res2; r3.innerText = res3;
                if (res1 === res2 && res2 === res3) {
                    state.balance += 5000000; state.total_earned += 5000000;
                    alert("🎰 ДЖЕКПОТ! Вы выиграли 5,000,000 $MELL!");
                } else { alert("Увы, ничего не выпало!"); }
                updateUI(); save();
            }, 1200);
        }

        function copyRefLink() {
            const refLink = `https://t.me{userId}`;
            navigator.clipboard.writeText(refLink);
            alert("Исправленная реф-ссылка скопирована в буфер обмена!");
        }

        setInterval(() => {
            if (state.income > 0) { state.balance += state.income; state.total_earned += state.income; }
            if (state.energy < 1000) state.energy = Math.min(1000, state.energy + 3);
            updateUI(); save();
        }, 1000);

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://github.io', buttonRootId: 'ton-connect-btn' });
        updateUI();
    </script>
</body>
</html>
